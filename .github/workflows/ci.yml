name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run check

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Secret Scan
        run: npx secretlint "**/*"
        continue-on-error: true

  plugin-load:
    name: Install and load openclaw-ynabro
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Pack ynabro and openclaw-ynabro tarballs
        run: |
          mkdir -p /tmp/tarballs
          npm pack --workspace packages/ynabro --pack-destination /tmp/tarballs
          npm pack --workspace packages/openclaw-ynabro --pack-destination /tmp/tarballs
          ls -la /tmp/tarballs/
      - name: Assert no workspace-local path deps in tarballs
        run: |
          set -e
          for TARBALL in /tmp/tarballs/*.tgz; do
            echo "=== Inspecting $(basename "$TARBALL") ==="
            MANIFEST=$(tar -xOzf "$TARBALL" package/package.json)
            if echo "$MANIFEST" | grep -q '"file:'; then
              echo "FAIL: $(basename "$TARBALL") contains a file: dependency."
              echo "Workspace-local paths do not resolve after install."
              echo "$MANIFEST"
              exit 1
            fi
          done
          echo "OK: no file: refs in any tarball manifest."
      - name: Assert dist/index.js has no runtime openclaw import
        run: |
          set -e
          # `openclaw plugins install` runs an undocumented post-install
          # "Repaired stale openclaw peer dependency" step that deletes the
          # `openclaw` package from the plugin's node_modules regardless of
          # how the plugin declared the dep. Any runtime `import` from
          # `openclaw/...` will therefore fail with ERR_MODULE_NOT_FOUND at
          # gateway load time and surface only as silent `toolNames: []` in
          # `openclaw plugins inspect`. Keep dist/index.js free of such
          # imports — type-only imports are stripped by tsc and are safe.
          DIST=packages/openclaw-ynabro/dist/index.js
          if grep -nE '^[[:space:]]*(import .* from |const .* = require\()[[:space:]]*["'\'']openclaw' "$DIST"; then
            echo "FAIL: $DIST contains a runtime openclaw import."
            echo "OpenClaw's installer will delete openclaw from the plugin's"
            echo "node_modules, causing silent load failure at gateway startup."
            echo "Replace runtime imports with inlined helpers and use"
            echo "\`import type\` for type-only references."
            exit 1
          fi
          echo "OK: no runtime openclaw imports in $DIST."
      - name: Install with OpenClaw-equivalent flags and load plugin
        run: |
          set -euo pipefail
          OC_TARBALL=$(ls /tmp/tarballs/openclaw-ynabro-*.tgz)
          YN_TARBALL=$(ls /tmp/tarballs/ynabro-*.tgz)
          INSTALL_DIR=$(mktemp -d)
          cd "$INSTALL_DIR"
          echo '{"type":"module"}' > package.json
          # Mirror the exact flags used by `openclaw plugins install` (see
          # docs.openclaw.ai/plugins/dependency-resolution). Critically we do
          # NOT manually inject `openclaw` here — the plugin's dist must be
          # self-contained (no runtime `openclaw` import) because OpenClaw's
          # installer deletes openclaw from the plugin tree post-install.
          npm install \
            --omit=dev \
            --omit=peer \
            --legacy-peer-deps \
            --ignore-scripts \
            --no-audit \
            --no-fund \
            "$OC_TARBALL" "$YN_TARBALL"
          echo "--- node_modules (top level) ---"
          ls node_modules/
          echo "--- Loading plugin entry (mirrors gateway startup) ---"
          # `import('openclaw-ynabro')` executes the top-level imports in
          # dist/index.js, which transitively imports ynabro, @sinclair/typebox,
          # openclaw/plugin-sdk/*, etc. Any missing runtime dep fails here with
          # the exact 'Cannot find module/package X' error OpenClaw would show.
          node --input-type=module -e "
            import('openclaw-ynabro')
              .then(m => {
                if (!m.default || !m.default.id) {
                  console.error('FAIL: no default export / missing id');
                  process.exit(1);
                }
                console.log('LOAD OK: plugin id =', m.default.id);
              })
              .catch(err => {
                console.error('LOAD FAILED:', err.message);
                process.exit(1);
              });
          "

  conformance:
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Cross-plugin conformance tests
        run: npx vitest run --reporter=verbose
        working-directory: packages/ynabro
