name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run check

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Secret Scan
        run: npx secretlint "**/*"
        continue-on-error: true

  plugin-inspector:
    name: Plugin Inspector (openclaw-ynabro)
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Run plugin-inspector
        run: |
          npx --yes @openclaw/plugin-inspector@latest ci \
            --plugin-root packages/openclaw-ynabro \
            --no-openclaw \
            --allow-execute \
            --mock-sdk \
            --sarif "$GITHUB_WORKSPACE/plugin-inspector.sarif" \
            --junit "$GITHUB_WORKSPACE/plugin-inspector.xml"
      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: plugin-inspector.sarif
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-inspector-junit
          path: plugin-inspector.xml

  pack-install:
    name: Pack & install simulation (openclaw-ynabro)
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Pack tarball
        run: npm pack --workspace packages/openclaw-ynabro --pack-destination /tmp
      - name: Simulate openclaw install (--omit=dev --omit=peer)
        run: |
          TARBALL=$(ls /tmp/openclaw-ynabro-*.tgz)
          INSTALL_DIR=$(mktemp -d)
          cd "$INSTALL_DIR"
          echo '{"type":"module"}' > package.json
          npm install \
            --omit=dev \
            --omit=peer \
            --legacy-peer-deps \
            --ignore-scripts \
            --no-audit \
            --no-fund \
            "$TARBALL"
          echo "--- Installed packages ---"
          ls node_modules/
          echo "--- Verifying runtime dependencies ---"
          test -d node_modules/@sinclair/typebox \
            || { echo "FAIL: @sinclair/typebox not installed (devDependency?)"; exit 1; }
          echo "All runtime dependencies resolved."

  conformance:
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Cross-plugin conformance tests
        run: npx vitest run --reporter=verbose
        working-directory: packages/ynabro
