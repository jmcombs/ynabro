name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run check

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Secret Scan
        run: npx secretlint "**/*"
        continue-on-error: true

  plugin-load:
    name: Install and load openclaw-ynabro
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Pack ynabro and openclaw-ynabro tarballs
        run: |
          mkdir -p /tmp/tarballs
          npm pack --workspace packages/ynabro --pack-destination /tmp/tarballs
          npm pack --workspace packages/openclaw-ynabro --pack-destination /tmp/tarballs
          ls -la /tmp/tarballs/
      - name: Assert no workspace-local path deps in tarballs
        run: |
          set -e
          for TARBALL in /tmp/tarballs/*.tgz; do
            echo "=== Inspecting $(basename "$TARBALL") ==="
            MANIFEST=$(tar -xOzf "$TARBALL" package/package.json)
            if echo "$MANIFEST" | grep -q '"file:'; then
              echo "FAIL: $(basename "$TARBALL") contains a file: dependency."
              echo "Workspace-local paths do not resolve after install."
              echo "$MANIFEST"
              exit 1
            fi
          done
          echo "OK: no file: refs in any tarball manifest."
      - name: Install with OpenClaw-equivalent flags and load plugin
        run: |
          set -euo pipefail
          OC_TARBALL=$(ls /tmp/tarballs/openclaw-ynabro-*.tgz)
          YN_TARBALL=$(ls /tmp/tarballs/ynabro-*.tgz)
          INSTALL_DIR=$(mktemp -d)
          cd "$INSTALL_DIR"
          echo '{"type":"module"}' > package.json
          # Mirror the exact flags used by `openclaw plugins install` (see
          # docs.openclaw.ai/plugins/dependency-resolution). The plugin must
          # declare `openclaw` in its own `dependencies` because
          # peerDependencies and devDependencies are explicitly excluded by
          # these flags — that's the documented contract, and the bug
          # this test guards against (see openclaw/openclaw#70436).
          npm install \
            --omit=dev \
            --omit=peer \
            --legacy-peer-deps \
            --ignore-scripts \
            --no-audit \
            --no-fund \
            "$OC_TARBALL" "$YN_TARBALL"
          echo "--- verifying openclaw resolves from the plugin's own tree ---"
          if [ ! -d node_modules/openclaw ]; then
            echo "FAIL: openclaw is not in the plugin's node_modules."
            echo "This means the plugin did not declare 'openclaw' as a regular"
            echo "dependency, and \`openclaw plugins install\` will fail at"
            echo "runtime with 'Cannot find package openclaw'."
            exit 1
          fi
          echo "--- node_modules (top level) ---"
          ls node_modules/
          echo "--- Loading plugin entry (mirrors gateway startup) ---"
          # `import('openclaw-ynabro')` executes the top-level imports in
          # dist/index.js, which transitively imports ynabro, @sinclair/typebox,
          # openclaw/plugin-sdk/*, etc. Any missing runtime dep fails here with
          # the exact 'Cannot find module/package X' error OpenClaw would show.
          node --input-type=module -e "
            import('openclaw-ynabro')
              .then(m => {
                if (!m.default || !m.default.id) {
                  console.error('FAIL: no default export / missing id');
                  process.exit(1);
                }
                console.log('LOAD OK: plugin id =', m.default.id);
              })
              .catch(err => {
                console.error('LOAD FAILED:', err.message);
                process.exit(1);
              });
          "

  conformance:
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Cross-plugin conformance tests
        run: npx vitest run --reporter=verbose
        working-directory: packages/ynabro
