name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Generate release matrix
        id: set-matrix
        shell: bash
        env:
          RELEASE_OUTPUTS: ${{ toJSON(steps.release.outputs) }}
          CONFIG_PATH: "release-please-config.json"
        run: |
          node -e "const fs = require('fs'); const config = JSON.parse(fs.readFileSync(process.env.CONFIG_PATH, 'utf8')); const outputs = JSON.parse(process.env.RELEASE_OUTPUTS); const releasedPackages = Object.keys(config.packages).filter(pkgPath => { const prefix = pkgPath === '.' ? '' : pkgPath + '--'; return outputs[prefix + 'release_created'] === 'true'; }).map(pkgPath => { const prefix = pkgPath === '.' ? '' : pkgPath + '--'; return { name: config.packages[pkgPath].component || pkgPath.split('/').pop(), path: pkgPath, tag: outputs[prefix + 'tag_name'] }; }); console.log('matrix=' + JSON.stringify(releasedPackages));" >> $GITHUB_OUTPUT

  publish:
    name: Publish ${{ matrix.package.name }}
    needs: release-please
    if: ${{ needs.release-please.outputs.matrix != '[]' && needs.release-please.outputs.matrix != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.release-please.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.package.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for OIDC Trusted Publishing
        run: npm install -g npm@latest

      - name: Verify npm version
        run: npm --version

      - name: Install dependencies
        run: npm ci

      - name: Copy skill files for pi-ynabro
        if: matrix.package.name == 'pi-ynabro'
        run: |
          mkdir -p packages/pi-ynabro/skills/ynabro
          cp -r skills/ynabro/* packages/pi-ynabro/skills/ynabro/

      - name: Verify skill files for pi-ynabro
        if: matrix.package.name == 'pi-ynabro'
        run: |
          if [ ! -f packages/pi-ynabro/skills/ynabro/SKILL.md ]; then
            echo "ERROR: Skill files were not copied for pi-ynabro"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Publish to npm with provenance
        run: |
          if [ "${{ matrix.package.path }}" = "." ]; then
            npm publish --provenance --access public
          else
            npm publish --provenance --access public --workspace=${{ matrix.package.path }}
          fi
